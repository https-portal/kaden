        const poem = `YOU ARE THE STORY I WANT TO KEEP WRITING WHEN I CHOOSE YOU IN THIS WORLD OF ENDLESS PAGES MY HEART WRITES LOVE THROUGH ALL THE AGES YOUR SMILE BECOMES THE INK THAT NEVER FADES IN EVERYDAY LIFE YOUR LOVE IS MY SHADE I WISH THIS STORY WOULD NEVER DEPART FOR YOU ARE THE STRENGTH INSIDE MY HEART IN EVERY CHAPTER YOUR PRESENCE BRINGS ME PEACE MY HAPPINESS MY HEART'S RESTING PLACE I LOOK AHEAD TO THE LINES NOT YET TOLD TO A FUTURE TOGETHER AS WE GROW OLD EACH MOMENT WITH YOU A TREASURE I HOLD A LOVE THAT IS WORTH MORE THAN SILVER OR GOLD THROUGH BEAUTIFUL LINES THAT WE HAVE TRACED A STORY THAT CAN NEVER BE ERASED MY PROMISE TO YOU IS SIMPLE AND DEEP A VOW TO EVERY CHAPTER I CHOOSE TO KEEP BY DEIB LHOR `;

        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status-text');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function generatePortrait(source) {
            loader.style.display = "block";
            statusText.innerText = "Gi-decode ang litrato...";
            
            const img = new Image();
            
            img.onload = function() {
                statusText.innerText = "Nag-tinta na sa papel...";
                
                // Gilapdon (Width) sa characters
                const w = 180; 
                const h = (img.height / img.width) * w;
                
                canvas.width = w;
                canvas.height = h;
                
                ctx.drawImage(img, 0, 0, w, h);
                
                try {
                    const pixels = ctx.getImageData(0, 0, w, h).data;
                    let result = "";
                    let pIdx = 0;

                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const i = (y * w + x) * 4;
                            // Grayscale logic
                            const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                            
                            if (brightness < 125) {
                                result += poem[pIdx % poem.length];
                                pIdx++;
                            } else if (brightness < 200) {
                                result += "·"; 
                            } else {
                                result += " "; 
                            }
                        }
                        result += "\n";
                    }

                    loader.style.display = "none";
                    statusText.style.display = "none";
                    output.innerText = result;
                    
                } catch (err) {
                    loader.style.display = "none";
                    statusText.innerText = "Error sa pag-process.";
                }
            };

            img.onerror = function() {
                loader.style.display = "none";
                statusText.innerText = "Error: Invalid ang Base64 string.";
            };

            img.src = source;
        }
